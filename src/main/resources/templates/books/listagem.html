<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <title>Biblioteca - Livros</title>
    <link rel="stylesheet" th:href="@{/css/books.css}" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="top-bar">
        <div sec:authorize="isAuthenticated()" class="user-info">
          <span class="user-greeting">
            Bem-vindo,
            <strong sec:authentication="principal.displayName"></strong>
          </span>
          <form class="logout-form" th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">Sair</button>
          </form>
        </div>
        <div sec:authorize="!isAuthenticated()">
          <a th:href="@{/login}" class="btn-link">Entrar</a>
        </div>
      </div>

      <h1>Lista de Livros</h1>

      <a th:href="@{/books/new}">Criar novo livro</a>
      <a class="books-authors" th:href="@{/authors}">Ir para autores</a>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>nome</th>
            <th>Autor</th>
            <th>Ano</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="book : ${books}">
            <td>[[${book.id}]]</td>
            <td>[[${book.title}]]</td>
            <td>
              <!-- iterStat é uma variável de estado automática do th:each -->
              <!-- dás-lhe o nome que quiseres: authorStat, stat, loop... -->
              <span th:each="author, authorStat : ${book.authors}">
                [[${author.name}]]
                <!-- authorStat.last → true se for o último elemento -->
                <span th:if="${!authorStat.last}">, </span>
              </span>
            </td>
            <td>[[${book.year}]]</td>
            <td>
              <a th:href="@{'/books/' + ${book.id} + '/edit'}">Editar</a>
              <a
                th:href="@{'/books/' + ${book.id} + '/delete'}"
                onclick="return confirm('Tens a certeza que queres apagar?');"
                >Apagar</a
              >
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
