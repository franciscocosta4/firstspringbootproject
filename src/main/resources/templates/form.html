<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Livro</title>
</head>
<body>

<h1 th:text="${book.id} == null ? 'Novo Livro' : 'Editar Livro'">Livro</h1>

<!-- th:object liga o form ao objeto "book" -->
<form th:action="${book.id} == null ? @{/books} : @{/books/{id}(id=${book.id})}"
      th:object="${book}"
      method="post">

    <!-- Campo oculto para o id (necessário em edição) -->
    <input type="hidden" th:field="*{id}"/>

    <div>
        <label for="title">Título:</label>
        <!-- th:field liga ao campo title do objeto book -->
        <input type="text" id="title" th:field="*{title}"/>
        <!-- Mostra erro de validação, se existir -->
        <span th:if="${#fields.hasErrors('title')}"
              th:errors="*{title}"></span>
    </div>

    <div>
        <label for="author">Autor:</label>
        <input type="text" id="author" th:field="*{author}"/>
        <span th:if="${#fields.hasErrors('author')}"
              th:errors="*{author}"></span>
    </div>

    <div>
        <label for="year">Ano:</label>
        <input type="number" id="year" th:field="*{year}"/>
        <span th:if="${#fields.hasErrors('year')}"
              th:errors="*{year}"></span>
    </div>

    <div>
        <button type="submit">Guardar</button>
        <a th:href="@{/books}">Cancelar</a>
    </div>
</form>

</body>
</html>
