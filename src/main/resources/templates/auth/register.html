<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca — Registo</title>
    <link rel="stylesheet" th:href="@{/css/books.css}"/>
</head>
<body>
<div class="page-wrapper auth-wrapper">

    <h1>Criar conta</h1>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div>
            <label for="username">Nome</label>
            <input type="text" id="username" th:field="*{username}" placeholder="O teu nome"/>
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" placeholder="o.teu@email.com"/>
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" placeholder="••••••••"/>
        </div>
        <div class="form-actions">
            <button type="submit">Registar</button>
            <a th:href="@{/login}">Já tenho conta</a>
        </div>
    </form>

</div>
</body>
</html>
