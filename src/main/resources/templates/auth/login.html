<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca — Entrar</title>
    <link rel="stylesheet" th:href="@{/css/books.css}"/>
</head>
<body>
<div class="page-wrapper auth-wrapper">

    <h1>Entrar</h1>

    <form th:action="@{/login}" method="post">
        <div>
            <label for="username">Email</label>
            <input type="email" id="username" name="username" placeholder="o.teu@email.com" autofocus/>
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••"/>
        </div>
        <div th:if="${param.error}">
            <span>Email ou password incorretos.</span>
        </div>
        <div th:if="${param.logout}">
            <span class="msg-success">Sessão terminada com sucesso.</span>
        </div>
        <div class="form-actions">
            <button type="submit">Entrar</button>
            <a th:href="@{/register}">Criar conta</a>
        </div>
    </form>

</div>
</body>
</html>
